name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: rz-x86_64-linux

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: rz-aarch64-linux
            use-cross: true

          - target: x86_64-apple-darwin
            os: macos-latest
            name: rz-x86_64-macos

          - target: aarch64-apple-darwin
            os: macos-latest
            name: rz-aarch64-macos

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: rz-x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build (cross)
        if: matrix.use-cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.use-cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar czf ${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release rz
          echo "ASSET=${{ matrix.name }}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release && 7z a ../../../${{ matrix.name }}.zip rz.exe
          echo "ASSET=${{ matrix.name }}.zip" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

  upload-codeberg:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Upload to Codeberg release
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          CODEBERG_REPO: ${{ vars.CODEBERG_REPO }}
          TAG: ${{ github.ref_name }}
        run: |
          # Fetch existing release, or create one if it doesn't exist yet
          RELEASE=$(curl -sf \
            -H "Authorization: token $CODEBERG_TOKEN" \
            "https://codeberg.org/api/v1/repos/$CODEBERG_REPO/releases/tags/$TAG" 2>/dev/null) || true

          RELEASE_ID=$(echo "$RELEASE" | jq -r '.id // empty')

          if [ -z "$RELEASE_ID" ]; then
            echo "No release found for $TAG — creating one on Codeberg..."
            RELEASE=$(curl -sf -X POST \
              -H "Authorization: token $CODEBERG_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"tag_name\": \"$TAG\", \"name\": \"$TAG\", \"draft\": false}" \
              "https://codeberg.org/api/v1/repos/$CODEBERG_REPO/releases")
            RELEASE_ID=$(echo "$RELEASE" | jq -r '.id')
          fi

          echo "Uploading assets to Codeberg release $RELEASE_ID..."
          for file in rz-*; do
            echo "  $file"
            curl -sf -X POST \
              -H "Authorization: token $CODEBERG_TOKEN" \
              -F "attachment=@$file" \
              "https://codeberg.org/api/v1/repos/$CODEBERG_REPO/releases/$RELEASE_ID/assets?name=$(basename "$file")"
          done
          echo "Done."
